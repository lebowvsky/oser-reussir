services:
  postgres:
    restart: unless-stopped
    ports: []
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    networks:
      - oser-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV}
      BACKEND_PORT: ${BACKEND_PORT}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
    expose:
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oser-network
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTP router (redirect to HTTPS)
      - "traefik.http.routers.backend-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.backend-api.entrypoints=web"
      - "traefik.http.routers.backend-api.middlewares=redirect-to-https@file"
      # HTTPS router
      - "traefik.http.routers.backend-api-secure.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.backend-api-secure.entrypoints=websecure"
      - "traefik.http.routers.backend-api-secure.tls=true"
      - "traefik.http.routers.backend-api-secure.tls.certresolver=letsencrypt"
      # Service configuration
      - "traefik.http.services.backend-api.loadbalancer.server.port=4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE}
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - oser-network
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTP router (redirect to HTTPS)
      - "traefik.http.routers.frontend.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.routers.frontend.middlewares=redirect-to-https@file"
      # HTTPS router
      - "traefik.http.routers.frontend-secure.rule=Host(`${FRONTEND_DOMAIN}`)"
      - "traefik.http.routers.frontend-secure.entrypoints=websecure"
      - "traefik.http.routers.frontend-secure.tls=true"
      - "traefik.http.routers.frontend-secure.tls.certresolver=letsencrypt"
      # Service configuration
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

  backoffice:
    build:
      context: ./backoffice
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    expose:
      - "80"
    depends_on:
      - backend
    networks:
      - oser-network
      - dokploy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      # HTTP router (redirect to HTTPS)
      - "traefik.http.routers.backoffice.rule=Host(`${BACKOFFICE_DOMAIN}`)"
      - "traefik.http.routers.backoffice.entrypoints=web"
      - "traefik.http.routers.backoffice.middlewares=redirect-to-https@file"
      # HTTPS router
      - "traefik.http.routers.backoffice-secure.rule=Host(`${BACKOFFICE_DOMAIN}`)"
      - "traefik.http.routers.backoffice-secure.entrypoints=websecure"
      - "traefik.http.routers.backoffice-secure.tls=true"
      - "traefik.http.routers.backoffice-secure.tls.certresolver=letsencrypt"
      # Service configuration
      - "traefik.http.services.backoffice.loadbalancer.server.port=80"

networks:
  oser-network:
    driver: bridge
  dokploy-network:
    external: true
